name: Docs CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      DD_SCOPE_BASE: a50b827c3bdb6f99d4c29422df73d492ed1b5f5f
      DD_SCOPE_DIFF_FILTER: ACMR
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            _docs/**/*.md
            _evals/**/*.md
            README.md
            AGENTS.md
            TODO.md
            QUICKSTART.md
            !_docs/archives/**/*
            !_docs/standards/templates/**/*
          config: .markdownlint.jsonc

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run documentation validators
        run: ./scripts/check-docs.sh
